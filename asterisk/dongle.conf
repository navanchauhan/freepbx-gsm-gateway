[general]
;
; Tello SIM (T-Mobile network).
;
interval=15
smsdb=/var/lib/asterisk/smsdb
csmsttl=600

[defaults]
context=from-dongle
group=0
language=en
rxgain=0
txgain=0
resetdongle=yes
initstate=start
usecallingpres=yes
callwaiting=auto

; SMS reception can crash some devices/firmware if SMS arrives mid-call.
; Set to 'yes' if you see instability.
disablesms=no

[dongle0]
; SIM7600 exposes multiple ttyUSB interfaces; these defaults may need swapping.
; - AT/data port: typically ttyUSB2 or ttyUSB3
; - Audio port:   varies; ttyUSB1 often works for non-UAC devices
;
; If you can, prefer stable host paths via /dev/serial/by-id/* and bind-mount those.

audio=/dev/ttyUSB1
data=/dev/ttyUSB2

; Optional SIM PIN
; pin=1234
