; Quectel/SimCOM Channel Driver Configuration
; For SIM7600G-H

[general]
interval=15

[defaults]
context=from-dongle
group=0
language=en
rxgain=-1
txgain=-1
autodeletesms=yes
resetmodem=yes
usecallingpres=yes
callwaiting=auto
initstate=start
dsci=on

[quectel0]
; SIM7600G-H USB modem
; Docker reliably exposes the mapped ttyUSB devices even when /dev/serial/by-id is empty.
data=/dev/ttyUSB2
; Working serial-audio port for SIM7600G-H.
audio=/dev/ttyUSB4

; UAC mode: yes,no,ext (use 'no' for serial audio)
uac=no
slin16=yes
