[general]
interval=15

[defaults]
context=from-dongle
group=0
language=en
rxgain=0
txgain=0
initstate=start
callwaiting=auto

[quectel0]
; SIM7600 exposes multiple ttyUSB interfaces; these defaults may need swapping.

audio=/dev/ttyUSB1
data=/dev/ttyUSB2

; Uncomment if using USB Audio Class mode.
quec_uac=1
alsadev=default

; Optional SIM PIN
; pin=1234
