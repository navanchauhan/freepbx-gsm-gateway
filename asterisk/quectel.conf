; Quectel/SimCOM Channel Driver Configuration
; For SIM7600G-H

[general]
interval=15

[defaults]
context=from-dongle
group=0
language=en
rxgain=-1
txgain=-1
autodeletesms=yes
resetmodem=yes
usecallingpres=yes
callwaiting=auto
initstate=start
dsci=on

[quectel0]
; SIM7600G-H USB modem
; Data port for AT commands (stable by-id path)
data=/dev/serial/by-id/usb-SimTech__Incorporated_SimTech__Incorporated_0123456789ABCDEF-if04-port0
; Audio port (serial audio)
audio=/dev/serial/by-id/usb-SimTech__Incorporated_SimTech__Incorporated_0123456789ABCDEF-if06-port0

; UAC mode: yes,no,ext (use 'no' for serial audio)
uac=no
slin16=yes
