; PJSIP Custom Configuration for SIM7600 Gateway
; This file is included by pjsip.conf

; Transport for UDP
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; Test endpoint for Python SIP client
[testuser]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
auth=testuser-auth
aors=testuser
direct_media=no

[testuser-auth]
type=auth
auth_type=userpass
username=testuser
password=testpass123

[testuser-aor]
type=aor
max_contacts=5
remove_existing=yes
