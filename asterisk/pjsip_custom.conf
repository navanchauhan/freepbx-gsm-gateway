; PJSIP Custom Configuration for SIM7600 Gateway
; This file is included by pjsip.conf

; Transport for UDP (PJSIP)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5160

; Python SIP client endpoint
[pyclient]
type=endpoint
context=from-pjsip
disallow=all
allow=ulaw
; Reuse the same object name so inbound REGISTER resolves to the right AOR.
auth=pyclient
aors=pyclient
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
rtp_keepalive=15
dtmf_mode=rfc4733

[pyclient]
type=auth
auth_type=userpass
username=pyclient
password=pyclientpass

[pyclient]
type=aor
max_contacts=1
remove_existing=yes
