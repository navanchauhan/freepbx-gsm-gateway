; PJSIP Custom Configuration for SIM7600 Gateway
; This file is included by pjsip.conf

; Transport for UDP (PJSIP)
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5160

; Python SIP client endpoint
[pyclient]
type=endpoint
context=from-pjsip
disallow=all
allow=ulaw
allow=alaw
auth=pyclient-auth
aors=pyclient-aor
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
rtp_keepalive=15
rtptimeout=0
rtpholdtimeout=0
dtmf_mode=rfc4733

[pyclient-auth]
type=auth
auth_type=userpass
username=pyclient
password=pyclientpass

[pyclient-aor]
type=aor
max_contacts=1
remove_existing=yes
