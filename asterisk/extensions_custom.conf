; Custom Extensions for SIM7600 LTE Gateway

[from-internal]
; Outbound calls via quectel - dial 9 + number
exten => _9NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN:1} via quectel)
 same => n,Dial(Quectel/quectel0/${EXTEN:1},60,tT)
 same => n,Hangup()

; Outbound calls with full number (1 + 10 digits)
exten => _91NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN:1} via quectel)
 same => n,Dial(Quectel/quectel0/${EXTEN:1},60,tT)
 same => n,Hangup()

; Direct 10-digit dialing
exten => _NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN} via quectel)
 same => n,Dial(Quectel/quectel0/1${EXTEN},60,tT)
 same => n,Hangup()

; Echo test
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Speaking clock
exten => 601,1,Answer()
 same => n,SayUnixTime()
 same => n,Hangup()

; Simple playback test (built-in sound)
exten => 888,1,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

[play-audio]
exten => s,1,Answer()
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CHFA=0")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CMICGAIN=3")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+COUTGAIN=8")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CPCMREG=1")
 same => n,Set(AUDIO_FILE=${IF($["${AUDIO_FILE}"=""]?hello-world:${AUDIO_FILE})})
 same => n,Wait(1)
 same => n,Playback(${AUDIO_FILE})
 same => n,Wait(1)
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CPCMREG=0")
 same => n,Hangup()

; Incoming calls from quectel (context name retained)
[from-dongle]
exten => s,1,NoOp(Incoming call from ${CALLERID(num)} via quectel)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; Catch-all for incoming DID
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; SMS handling for quectel
[quectel-incoming]
exten => sms,1,NoOp(Incoming SMS from ${CALLERID(num)})
 same => n,Verbose(2,[${QUECTEL_NAME}] SMS from ${CALLERID(num)}: ${QUECTEL_SMS})
 same => n,System(echo "[$(date)] From: ${CALLERID(num)} Message: ${QUECTEL_SMS}" >> /var/log/asterisk/sms.log)
 same => n,Hangup()

[record-call]
exten => s,1,Answer()
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CHFA=0")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CMICGAIN=3")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+COUTGAIN=8")
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CPCMREG=1")
 same => n,Set(RECFILE=/var/spool/asterisk/monitor/recording-${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}.wav)
 same => n,MixMonitor(${RECFILE})
 same => n,Wait(600)
 same => n,System(/usr/sbin/asterisk -rx "quectel cmd quectel0 AT+CPCMREG=0")
 same => n,Hangup()
