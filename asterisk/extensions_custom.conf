; Custom Extensions for SIM7600 GSM Gateway
; Handles inbound calls/SMS from dongle and outbound dialing

; Context for SIP users to make outbound calls
[from-internal]
; Outbound calls via dongle - dial 9 + number
exten => _9NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN:1} via dongle)
 same => n,Set(CALLERID(num)=7203454122)
 same => n,Dial(Dongle/dongle0/${EXTEN:1},60,tT)
 same => n,Hangup()

; Outbound calls with full number (1 + 10 digits)
exten => _91NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN:1} via dongle)
 same => n,Set(CALLERID(num)=7203454122)
 same => n,Dial(Dongle/dongle0/${EXTEN:1},60,tT)
 same => n,Hangup()

; Direct 10-digit dialing
exten => _NXXNXXXXXX,1,NoOp(Outbound call to ${EXTEN} via dongle)
 same => n,Set(CALLERID(num)=7203454122)
 same => n,Dial(Dongle/dongle0/1${EXTEN},60,tT)
 same => n,Hangup()

; Echo test
exten => 600,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Speaking clock
exten => 601,1,Answer()
 same => n,SayUnixTime()
 same => n,Hangup()

; Context for incoming calls from dongle
[from-dongle]
exten => s,1,NoOp(Incoming call from ${CALLERID(num)} via dongle)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; Catch-all for incoming DID
exten => _X.,1,NoOp(Incoming call to ${EXTEN} from ${CALLERID(num)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Hangup()

; SMS handling
[dongle-incoming]
exten => sms,1,NoOp(Incoming SMS from ${CALLERID(num)})
 same => n,Set(MESSAGE=${BASE64_DECODE(${SMS_BASE64})})
 same => n,Verbose(2,[${DONGLENAME}] SMS from ${CALLERID(num)}: ${MESSAGE})
 same => n,System(echo "[$(date)] From: ${CALLERID(num)} Message: ${MESSAGE}" >> /var/log/asterisk/sms.log)
 same => n,Hangup()
