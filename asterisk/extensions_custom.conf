; FreePBX will include this file automatically.
;
; Outbound via modem:
; - Create a FreePBX "Custom Trunk" with Dial String:
;     Dongle/dongle0/${OUTNUM}$
;   or
;     Quectel/quectel0/${OUTNUM}$
;
; Inbound/SMS contexts below are referenced from dongle.conf/quectel.conf.

[from-dongle]
exten => s,1,NoOp(Incoming call via dongle)
 same => n,Goto(from-trunk,${DID},1)

[dongle-incoming]
exten => sms,1,Verbose(2,[${DONGLENAME}] SMS from ${CALLERID(num)}: ${BASE64_DECODE(${SMS_BASE64})})
 same => n,Hangup()

[quectel-incoming]
exten => sms,1,Verbose(2,[${QUECTELNAME}] SMS from ${CALLERID(num)}: ${BASE64_DECODE(${SMS_BASE64})})
 same => n,Hangup()
