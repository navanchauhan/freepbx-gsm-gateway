services:
  freepbx:
    build:
      context: .
      dockerfile: Dockerfile.freepbx
    container_name: freepbx-sim7600
    hostname: freepbx-sim7600
    restart: unless-stopped

    # Simplest route for USB serial + optional USB audio (SIM7600 UAC).
    privileged: true

    group_add:
      - "16"

    environment:
      TZ: ${TZ:-UTC}
      TIMEZONE: ${TIMEZONE:-${TZ:-UTC}}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}

    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
      - "${SIP_PORT_UDP:-5060}:5060/udp"
      - "${SIP_PORT_TCP:-5060}:5060/tcp"
      - "${PJSIP_PORT_UDP:-5160}:5160/udp"
      - "${RTP_PORT_START:-18000}-${RTP_PORT_END:-20000}:${RTP_PORT_START:-18000}-${RTP_PORT_END:-20000}/udp"

    # Persist FreePBX and Asterisk state.
    volumes:
      - ./data:/data

      # FreePBX-safe Asterisk include points.
      - ./asterisk/modules_custom.conf:/etc/asterisk/modules_custom.conf
      - ./asterisk/extensions_custom.conf:/etc/asterisk/extensions_custom.conf
      - ./asterisk/dongle.conf:/etc/asterisk/dongle.conf
      - ./asterisk/quectel.conf:/etc/asterisk/quectel.conf

      # Allow access to the USB stack and optional USB-audio.
      - /dev/bus/usb:/dev/bus/usb

    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
      - /dev/ttyUSB4:/dev/ttyUSB4

      # If the SIM7600 exposes a USB Audio Class device, map ALSA.
      - /dev/snd:/dev/snd
