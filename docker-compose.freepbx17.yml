services:
  freepbx:
    build:
      context: .
      dockerfile: Dockerfile.freepbx17
    container_name: freepbx-sim7600
    hostname: freepbx-sim7600
    restart: unless-stopped
    privileged: true

    environment:
      - TZ=${TZ:-America/Los_Angeles}

    ports:
      - "${HTTP_PORT:-8081}:80"
      - "${HTTPS_PORT:-8444}:443"
      - "${SIP_PORT:-5060}:5060/udp"
      - "${SIP_PORT:-5060}:5060/tcp"
      - "${PJSIP_PORT:-5160}:5160/udp"
      # RTP ports handled by iptables in escomputers image

    volumes:
      # Persistent data
      - ./data/asterisk:/var/lib/asterisk
      - ./data/mysql:/var/lib/mysql
      - ./data/logs:/var/log/asterisk

      # Asterisk configs
      - ./asterisk/dongle.conf:/etc/asterisk/dongle.conf
      - ./asterisk/quectel.conf:/etc/asterisk/quectel.conf
      - ./asterisk/extensions_custom.conf:/etc/asterisk/extensions_custom.conf
      - ./asterisk/modules_custom.conf:/etc/asterisk/modules_custom.conf

      # USB access
      - /dev/bus/usb:/dev/bus/usb

    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
      - /dev/ttyUSB4:/dev/ttyUSB4
      - /dev/snd:/dev/snd
