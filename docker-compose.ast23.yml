services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile.ast23
    container_name: asterisk-sim7600
    hostname: asterisk-sim7600
    restart: unless-stopped
    privileged: true

    environment:
      - TZ=${TZ:-America/Los_Angeles}

    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "5160:5160/udp"
      - "5038:5038/tcp"    # AMI
      - "10000-10200:10000-10200/udp"

    volumes:
      # Asterisk configs
      - ./asterisk/dongle.conf:/etc/asterisk/dongle.conf
      - ./asterisk/quectel.conf:/etc/asterisk/quectel.conf
      - ./asterisk/extensions_custom.conf:/etc/asterisk/extensions_custom.conf
      - ./asterisk/pjsip_custom.conf:/etc/asterisk/pjsip_custom.conf
      - ./asterisk/manager_custom.conf:/etc/asterisk/manager_custom.conf
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf

      # USB access
      - /dev/bus/usb:/dev/bus/usb

    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
      - /dev/ttyUSB4:/dev/ttyUSB4
      - /dev/snd:/dev/snd
