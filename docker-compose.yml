services:
  asterisk:
    build:
      context: .
      dockerfile: Dockerfile.ast23
    container_name: asterisk-sim7600
    hostname: asterisk-sim7600
    restart: unless-stopped
    privileged: true

    group_add:
      - "16"

    environment:
      - TZ=${TZ:-America/Los_Angeles}

    ports:
      - "${SIP_PORT_UDP:-5060}:5060/udp"
      - "${SIP_PORT_TCP:-5060}:5060/tcp"
      - "${PJSIP_PORT_UDP:-5160}:5160/udp"
      - "${AMI_PORT:-5038}:5038/tcp"
      - "${RTP_PORT_START:-10000}-${RTP_PORT_END:-20000}:${RTP_PORT_START:-10000}-${RTP_PORT_END:-20000}/udp"

    volumes:
      - ./asterisk/quectel.conf:/etc/asterisk/quectel.conf
      - ./asterisk/extensions_custom.conf:/etc/asterisk/extensions.conf
      - ./asterisk/pjsip_custom.conf:/etc/asterisk/pjsip.conf
      - ./asterisk/modules.conf:/etc/asterisk/modules.conf

      # Recordings and optional custom sounds
      - ./recordings:/var/spool/asterisk/monitor
      - ./sounds:/var/lib/asterisk/sounds/custom

      # USB access for modem
      - /dev/bus/usb:/dev/bus/usb
      - /dev/serial:/dev/serial

    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
      - /dev/ttyUSB1:/dev/ttyUSB1
      - /dev/ttyUSB2:/dev/ttyUSB2
      - /dev/ttyUSB3:/dev/ttyUSB3
      - /dev/ttyUSB4:/dev/ttyUSB4
      - /dev/snd:/dev/snd
